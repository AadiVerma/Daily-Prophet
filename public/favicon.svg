<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- parchment background -->
  <rect width="64" height="64" rx="6" fill="#1a1008"/>

  <!-- newspaper fold lines -->
  <rect x="8" y="10" width="48" height="44" rx="2" fill="#f5e6c8" stroke="#c8a84b" stroke-width="1.5"/>

  <!-- masthead bar -->
  <rect x="8" y="10" width="48" height="10" rx="2" fill="#1a1008"/>

  <!-- "DP" monogram in masthead -->
  <text x="32" y="20" font-family="Georgia, serif" font-size="8" font-weight="bold"
        fill="#c8a84b" text-anchor="middle" letter-spacing="1">DP</text>

  <!-- headline rules -->
  <line x1="11" y1="23" x2="53" y2="23" stroke="#1a1008" stroke-width="1.5"/>
  <line x1="11" y1="25" x2="53" y2="25" stroke="#1a1008" stroke-width="0.5"/>

  <!-- text lines (columns) -->
  <rect x="11" y="28" width="19" height="1.5" rx="0.5" fill="#555"/>
  <rect x="11" y="31" width="19" height="1.5" rx="0.5" fill="#555"/>
  <rect x="11" y="34" width="19" height="1.5" rx="0.5" fill="#555"/>
  <rect x="11" y="37" width="19" height="1.5" rx="0.5" fill="#555"/>
  <rect x="11" y="40" width="16" height="1.5" rx="0.5" fill="#555"/>

  <rect x="34" y="28" width="19" height="1.5" rx="0.5" fill="#555"/>
  <rect x="34" y="31" width="19" height="1.5" rx="0.5" fill="#555"/>
  <rect x="34" y="34" width="19" height="1.5" rx="0.5" fill="#555"/>
  <rect x="34" y="37" width="19" height="1.5" rx="0.5" fill="#555"/>
  <rect x="34" y="40" width="14" height="1.5" rx="0.5" fill="#555"/>

  <!-- column divider -->
  <line x1="32" y1="27" x2="32" y2="50" stroke="#aaa" stroke-width="0.5"/>

  <!-- footer rule -->
  <line x1="11" y1="47" x2="53" y2="47" stroke="#1a1008" stroke-width="0.8"/>
  <rect x="20" y="49" width="24" height="1.5" rx="0.5" fill="#888"/>
</svg>
